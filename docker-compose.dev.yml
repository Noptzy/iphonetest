services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: iphone_marketplace
      POSTGRES_PASSWORD: iphone_marketplace
      POSTGRES_DB: iphone_marketplace
    ports:
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iphone_marketplace"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
